name: CI — Orchestrator · Lint · Test

on:
  push:
    branches: [main]
    paths:
      - "orchestrator/**"
      - ".github/workflows/orchestrator-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "orchestrator/**"
      - ".github/workflows/orchestrator-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: orchestrator

jobs:
  # ── Lint + type-check (gate rápido) ──────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: orchestrator/pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check orchestrator/

      - name: Mypy type-check
        run: mypy orchestrator/

  # ── Testes unitários (sem serviços externos) ──────────────────────────────
  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: orchestrator/pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: >
          pytest tests/ -q --tb=short
          -m "not integration"
          --cov=orchestrator
          --cov-report=term-missing
          --cov-fail-under=30

  # ── CLI smoke test ────────────────────────────────────────────────────────
  cli-smoke:
    name: CLI smoke
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: orchestrator/pyproject.toml

      - name: Install package
        run: pip install -e .

      - name: orc --help
        run: orc --help

      - name: orc classify (no LLM)
        run: orc classify "quanta RAM tenho disponível?" || true

      - name: orc config
        run: orc config || true
